<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spam Email Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a30;
      --accent: #7c3aed;
      --accent-glow: rgba(124,58,237,0.25);
      --spam: #ef4444;
      --spam-glow: rgba(239,68,68,0.2);
      --safe: #22c55e;
      --safe-glow: rgba(34,197,94,0.2);
      --text: #f4f4f5;
      --muted: #71717a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 4px 14px;
      margin-bottom: 1rem;
      font-family: 'DM Sans', sans-serif;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    textarea {
      width: 100%;
      height: 160px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      padding: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    button {
      width: 100%;
      margin-top: 1.25rem;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .result-box {
      margin-top: 1.5rem;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: none;
      align-items: center;
      gap: 1rem;
      border: 1px solid;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-box.spam {
      background: var(--spam-glow);
      border-color: var(--spam);
    }

    .result-box.normal {
      background: var(--safe-glow);
      border-color: var(--safe);
    }

    .result-box.error {
      background: rgba(234,179,8,0.1);
      border-color: #eab308;
    }

    .result-icon { font-size: 2rem; }

    .result-label {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .result-box.spam .result-label { color: var(--spam); }
    .result-box.normal .result-label { color: var(--safe); }
    .result-box.error .result-label { color: #eab308; }

    .result-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">ML Project</div>
      <h1>Spam Email <span>Classifier</span></h1>
      <p class="subtitle">Paste any email text below and our model will detect whether it's spam or a normal email.</p>
    </div>

    <div class="card">
      <label for="emailText">Email Content</label>
      <textarea id="emailText" placeholder="e.g. Congratulations! You won Rs 10 lakh! Click here now..."></textarea>

      <button id="checkBtn" onclick="checkEmail()">
        <span id="btnText">Check Email</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div class="result-box" id="resultBox">
        <div class="result-icon" id="resultIcon"></div>
        <div>
          <div class="result-label" id="resultLabel"></div>
          <div class="result-sub" id="resultSub"></div>
        </div>
      </div>
    </div>

    <div class="footer">Built with Python · Flask · scikit-learn · TF-IDF</div>
  </div>

  <script>
    async function checkEmail() {
      const text = document.getElementById("emailText").value.trim();
      const btn = document.getElementById("checkBtn");
      const btnText = document.getElementById("btnText");
      const spinner = document.getElementById("spinner");
      const resultBox = document.getElementById("resultBox");

      if (!text) {
        showResult("error", "⚠️", "Empty Input", "Please enter some email text first.");
        return;
      }

      btn.disabled = true;
      btnText.style.display = "none";
      spinner.style.display = "block";
      resultBox.style.display = "none";

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: text })
        });
        const data = await res.json();

        if (data.result === "spam") {
          showResult("spam", "🚨", "SPAM EMAIL", "This email looks like spam. Be careful!");
        } else if (data.result === "normal") {
          showResult("normal", "✅", "NORMAL EMAIL", "This email looks safe and legitimate.");
        } else {
          showResult("error", "⚠️", "Error", data.message);
        }
      } catch (e) {
        showResult("error", "⚠️", "Connection Error", "Could not reach the server.");
      }

      btn.disabled = false;
      btnText.style.display = "block";
      spinner.style.display = "none";
    }

    function showResult(type, icon, label, sub) {
      const box = document.getElementById("resultBox");
      box.className = "result-box " + type;
      box.style.display = "flex";
      document.getElementById("resultIcon").textContent = icon;
      document.getElementById("resultLabel").textContent = label;
      document.getElementById("resultSub").textContent = sub;
    }

    document.getElementById("emailText").addEventListener("keydown", function(e) {
      if (e.ctrlKey && e.key === "Enter") checkEmail();
    });
  </script>
</body>
</html>
